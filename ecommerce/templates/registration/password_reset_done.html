{% extends 'base.html' %}

{% block title %}Email Sent{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow-sm text-center">
            <div class="card-body p-4">
                <i class="bi bi-envelope-check-fill text-primary fs-1"></i>
                <h4 class="mt-3">Check Your Email</h4>
                <p class="text-muted">We've emailed you instructions for resetting your password. If you don't see it, check your spam folder.</p>
                <a href="{% url 'login' %}" class="btn btn-primary">Back to Login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
